name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: escalation-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint

      - name: Phase 1 quality gate
        run: npm run ci:phase1

  deploy_api:
    runs-on: ubuntu-latest
    needs: quality_gate
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy API Worker
        run: npm run deploy --workspace @wargames/api

  deploy_web:
    runs-on: ubuntu-latest
    needs: quality_gate
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'escalation-web' }}
      CLOUDFLARE_PAGES_BRANCH: ${{ vars.CLOUDFLARE_PAGES_BRANCH || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build --workspace @wargames/web

      - name: Deploy web to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$CLOUDFLARE_PAGES_BRANCH"

  verify_deploy:
    runs-on: ubuntu-latest
    needs: [deploy_api, deploy_web]
    env:
      VERIFY_API_HEALTH_URL: ${{ vars.ESCALATION_VERIFY_API_HEALTH_URL || 'https://escalation.altiratech.com/api/healthz' }}
      VERIFY_API_BOOTSTRAP_URL: ${{ vars.ESCALATION_VERIFY_API_BOOTSTRAP_URL || 'https://escalation.altiratech.com/api/reference/bootstrap' }}
      VERIFY_WEB_URL: ${{ vars.ESCALATION_VERIFY_WEB_URL || 'https://escalation.altiratech.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify production deployment
        run: ./scripts/verify-deploy.sh
