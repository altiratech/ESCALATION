ts to say the word nuclear first.</text><text x="78" y="650" fill="#8f9aa8" font-family="IBM Plex Sans, sans-serif" font-size="17">LIVE SCENE ASSET // Once the first exchange is visible, the room starts counting what cannot be un-fired.</text></svg>