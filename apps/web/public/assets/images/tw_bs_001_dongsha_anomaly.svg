="22">No one trusts the picture enough to relax.</text><text x="718" y="540" fill="#d6dce3" font-family="IBM Plex Sans, sans-serif" font-size="22">That is why the room feels dangerous.</text><text x="78" y="650" fill="#8f9aa8" font-family="IBM Plex Sans, sans-serif" font-size="17">LIVE SCENE ASSET // The picture is wrong before anyone can explain why.</text></svg>